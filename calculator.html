<!DOCTYPE html>
<html>
  <head>
    <title>Calculator</title>
  </head>
  <link rel="stylesheet" href="style.css">
  <body>
    <p class="js-display text-style">0</p>
    <div class="js-styling"> 
      <button onclick="
        test1('1')
        console.log(`${calculation}`)
        ">1</button>

      <button onclick="
      test1('2')
      console.log(`${calculation}`)
      ">2</button>

      <button onclick="
      test1('3')
      console.log(`${calculation}`)
      ">3</button>
    <p>
      <button onclick="
      test1('4')
      console.log(`${calculation}`)
      ">4</button>

      <button onclick="
      test1('5')
      console.log(`${calculation}`)
      ">5</button>

      <button onclick="
      test1('6')
      console.log(`${calculation}`)
      ">6</button>
    </p>

    <button onclick="
      test1('7')
      console.log(`${calculation}`)
      ">7</button>

      <button onclick="
      test1('8')
      console.log(`${calculation}`)
      ">8</button>

      <button onclick="
      test1('9')
      console.log(`${calculation}`)
      ">9</button>
    <p>
      <button onclick="
      test1('+')
      console.log(`${calculation}`)
      ">+</button>
      
      <button onclick="
      test1('-')
      console.log(`${calculation}`)
      ">-</button>

      <button onclick="
      test1('*')
      console.log(`${calculation}`)
      ">x</button>

      <button onclick="
      calculation = eval(calculation);
      console.log(`${calculation}`)
      document.querySelector('.js-display').innerHTML = calculation
      
      ">=</button>

      </p>

      
    </div>
    
      <button onclick="
      calculation = '';
      console.log(`${calculation}`)
      document.querySelector('.js-display').innerHTML = '0'
      "
      class="clear-button-styling"
      >Clear</button>
    
   
  
    <script>
      let calculation = '';

      function test1 (value) {

        
        document.querySelector('.js-display').innerHTML = calculation += value
        

        
        
      }
    </script>


    
  </body>
</html>
